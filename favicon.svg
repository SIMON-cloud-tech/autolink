<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="carGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="windowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  
  <!-- Car body -->
  <path d="M6 18 L6 20 Q6 21 7 21 L9 21 Q9 22 10 22 L11 22 Q12 22 12 21 L20 21 Q20 22 21 22 L22 22 Q23 22 23 21 L25 21 Q26 21 26 20 L26 18 Q26 16 24 15 L22 12 Q20 10 16 10 Q12 10 10 12 L8 15 Q6 16 6 18 Z" 
        fill="url(#carGradient)" 
        stroke="#1e40af" 
        stroke-width="0.5"/>
  
  <!-- Car windows -->
  <path d="M9 14 L11 12 Q13 11 16 11 Q19 11 21 12 L23 14 L20 14 Q18 13 16 13 Q14 13 12 14 Z" 
        fill="url(#windowGradient)" 
        stroke="#2563eb" 
        stroke-width="0.3"/>
  
  <!-- Car wheels -->
  <circle cx="10" cy="21" r="2" fill="#1e293b" stroke="#0f172a" stroke-width="0.5"/>
  <circle cx="10" cy="21" r="1" fill="#64748b"/>
  <circle cx="22" cy="21" r="2" fill="#1e293b" stroke="#0f172a" stroke-width="0.5"/>
  <circle cx="22" cy="21" r="1" fill="#64748b"/>
  
  <!-- Headlights -->
  <circle cx="7" cy="17" r="0.8" fill="#fbbf24" opacity="0.9"/>
  <circle cx="25" cy="17" r="0.8" fill="#fbbf24" opacity="0.9"/>
  
  <!-- Grille detail -->
  <rect x="14" y="16" width="4" height="2" rx="0.5" fill="#1e40af" opacity="0.6"/>
</svg>
